name: Agentra CLI CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "agentra-cli/**"
      - ".github/workflows/agentra-cli-ci.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "agentra-cli/**"
      - ".github/workflows/agentra-cli-ci.yml"

jobs:
  test-agentra-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check -p agentra-cli
      - name: Cargo test
        run: cargo test -p agentra-cli
      - name: Installer syntax guardrails
        run: |
          for file in \
            agentic-memory/scripts/install.sh \
            agentic-codebase/scripts/install.sh \
            agentic-vision/scripts/install.sh; do
            if [ -f "$file" ]; then
              bash -n "$file"
            else
              echo "Skipping missing file in this repo checkout: $file"
            fi
          done
