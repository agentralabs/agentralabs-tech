<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="ACP Protocol network diagram">
  <defs>
    <style><![CDATA[
      .hand{font-family:'Segoe Print','Comic Sans MS','Caveat','Patrick Hand',cursive}
      .mono{font-family:'IBM Plex Mono','JetBrains Mono',monospace}
      .label{font-family:'Segoe Print','Comic Sans MS','Caveat',cursive;fill:#121212;text-anchor:middle}
      .sym{font-family:'Segoe Print','Comic Sans MS',cursive;font-size:24px;fill:#ea580c;font-weight:700}
      .prim{font-family:'IBM Plex Mono',monospace;font-size:11px;fill:#ea580c;text-anchor:middle}
      .note{font-family:'Segoe Print','Comic Sans MS',cursive;font-size:13px;fill:#6d6a63}
    ]]></style>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rough2" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#bbb" stroke-width="1.5"/>
    </marker>
    <marker id="aho" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#ea580c" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#fffdf7"/>
  <g opacity="0.1">
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#999"/>
    </pattern>
    <rect width="1600" height="900" fill="url(#dots)"/>
  </g>

  <!-- ============ TITLE ============ -->
  <text x="100" y="72" class="hand" font-size="38" font-weight="700" fill="#121212">Agent Commerce Protocol</text>
  <path d="M 98 80 C 200 84, 500 78, 620 82" fill="none" stroke="#ea580c" stroke-width="2.5" opacity="0.4" filter="url(#rough)"/>
  <text x="100" y="105" class="mono" font-size="14" fill="#6d6a63">An open standard for economic interactions between autonomous AI agents.</text>

  <!-- ============ AGENT NODES ============ -->

  <!-- Agent A (left) — buyer/requester -->
  <g filter="url(#rough)">
    <rect x="100" y="260" width="220" height="120" rx="14" fill="#fff" stroke="#121212" stroke-width="2.5"/>
  </g>
  <!-- robot face sketch -->
  <circle cx="160" cy="310" r="22" fill="none" stroke="#121212" stroke-width="2" filter="url(#rough)"/>
  <circle cx="152" cy="305" r="3" fill="#121212"/>
  <circle cx="168" cy="305" r="3" fill="#121212"/>
  <path d="M 150 318 C 155 324, 165 324, 170 318" fill="none" stroke="#121212" stroke-width="1.5"/>
  <path d="M 160 288 L 160 278" stroke="#121212" stroke-width="1.5"/>
  <circle cx="160" cy="275" r="3" fill="#ea580c"/>
  <text x="250" y="310" class="label" font-size="20" font-weight="700">Agent A</text>
  <text x="250" y="332" class="note" font-size="12" text-anchor="middle">buyer / requester</text>
  <text x="210" y="370" class="prim" font-size="10">AgentIdentity</text>

  <!-- Agent B (right) — seller/provider -->
  <g filter="url(#rough)">
    <rect x="1280" y="260" width="220" height="120" rx="14" fill="#fff" stroke="#121212" stroke-width="2.5"/>
  </g>
  <circle cx="1340" cy="310" r="22" fill="none" stroke="#121212" stroke-width="2" filter="url(#rough)"/>
  <circle cx="1332" cy="305" r="3" fill="#121212"/>
  <circle cx="1348" cy="305" r="3" fill="#121212"/>
  <path d="M 1330 318 C 1335 324, 1345 324, 1350 318" fill="none" stroke="#121212" stroke-width="1.5"/>
  <path d="M 1340 288 L 1340 278" stroke="#121212" stroke-width="1.5"/>
  <circle cx="1340" cy="275" r="3" fill="#ea580c"/>
  <text x="1430" y="310" class="label" font-size="20" font-weight="700">Agent B</text>
  <text x="1430" y="332" class="note" font-size="12" text-anchor="middle">seller / provider</text>
  <text x="1390" y="370" class="prim" font-size="10">AgentIdentity</text>

  <!-- Agent C (bottom) — escrow / verifier -->
  <g filter="url(#rough)">
    <rect x="680" y="680" width="240" height="110" rx="14" fill="#fff" stroke="#121212" stroke-width="2.5"/>
  </g>
  <circle cx="740" cy="725" r="22" fill="none" stroke="#121212" stroke-width="2" filter="url(#rough)"/>
  <circle cx="732" cy="720" r="3" fill="#121212"/>
  <circle cx="748" cy="720" r="3" fill="#121212"/>
  <path d="M 730 733 C 735 739, 745 739, 750 733" fill="none" stroke="#121212" stroke-width="1.5"/>
  <path d="M 740 703 L 740 693" stroke="#121212" stroke-width="1.5"/>
  <circle cx="740" cy="690" r="3" fill="#ea580c"/>
  <text x="840" y="725" class="label" font-size="20" font-weight="700">Agent C</text>
  <text x="840" y="747" class="note" font-size="12" text-anchor="middle">verifier / escrow</text>
  <text x="800" y="775" class="prim" font-size="10">VerityReceipt</text>

  <!-- ============ PROTOCOL FLOW (center) ============ -->

  <!-- Flow step boxes -->
  <!-- 1. REGISTER -->
  <g filter="url(#rough)">
    <rect x="390" y="200" width="130" height="44" rx="8" fill="#fff8f0" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="455" y="228" class="label" font-size="16" font-weight="700" fill="#ea580c">1. Register</text>

  <!-- 2. NEGOTIATE -->
  <g filter="url(#rough)">
    <rect x="570" y="310" width="150" height="44" rx="8" fill="#fff8f0" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="645" y="338" class="label" font-size="16" font-weight="700" fill="#ea580c">2. Negotiate</text>

  <!-- 3. EXECUTE -->
  <g filter="url(#rough)">
    <rect x="780" y="200" width="130" height="44" rx="8" fill="#fff8f0" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="845" y="228" class="label" font-size="16" font-weight="700" fill="#ea580c">3. Execute</text>

  <!-- 4. SETTLE -->
  <g filter="url(#rough)">
    <rect x="960" y="310" width="120" height="44" rx="8" fill="#fff8f0" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="1020" y="338" class="label" font-size="16" font-weight="700" fill="#ea580c">4. Settle</text>

  <!-- 5. AUDIT -->
  <g filter="url(#rough)">
    <rect x="1100" y="200" width="110" height="44" rx="8" fill="#fff8f0" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="1155" y="228" class="label" font-size="16" font-weight="700" fill="#ea580c">5. Audit</text>

  <!-- Flow arrows between steps -->
  <g fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" opacity="0.7" filter="url(#rough2)">
    <path d="M 520 222 C 540 260, 560 290, 580 318"/>
    <path d="M 720 332 C 740 290, 760 250, 785 230"/>
    <path d="M 910 222 C 930 260, 950 290, 962 318"/>
    <path d="M 1080 332 C 1090 290, 1095 260, 1105 230"/>
  </g>

  <!-- Arrows from Agent A to flow -->
  <g fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" filter="url(#rough2)">
    <path d="M 320 290 C 350 260, 370 240, 395 225"/>
    <path d="M 320 330 C 400 335, 500 335, 570 335"/>
  </g>

  <!-- Arrows from flow to Agent B -->
  <g fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" filter="url(#rough2)">
    <path d="M 1210 222 C 1240 250, 1260 270, 1280 290"/>
    <path d="M 1080 335 C 1150 335, 1220 330, 1280 320"/>
  </g>

  <!-- Arrows to/from Agent C (escrow) -->
  <g fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4" filter="url(#rough2)">
    <path d="M 645 354 C 660 450, 680 580, 700 680"/>
    <path d="M 1020 354 C 980 450, 900 580, 850 680"/>
  </g>

  <!-- ============ SYMBOLS ON ARROWS ============ -->
  <!-- Lightning bolts on main flow -->
  <text x="540" y="268" class="sym" transform="rotate(20 540 268)">⚡</text>
  <text x="760" y="268" class="sym" transform="rotate(-20 760 268)">⚡</text>
  <text x="1095" y="268" class="sym" transform="rotate(-15 1095 268)">⚡</text>

  <!-- Dollar signs on transaction arrows -->
  <text x="355" y="256" class="sym" font-size="20" transform="rotate(-15 355 256)">$</text>
  <text x="950" y="275" class="sym" font-size="20" transform="rotate(20 950 275)">$</text>
  <text x="1250" y="275" class="sym" font-size="20" transform="rotate(15 1250 275)">$</text>
  <text x="450" y="340" class="sym" font-size="18">$</text>
  <text x="1200" y="340" class="sym" font-size="18">$</text>

  <!-- Dollar signs on escrow paths -->
  <text x="660" y="520" class="sym" font-size="18" transform="rotate(5 660 520)">$</text>
  <text x="930" y="520" class="sym" font-size="18" transform="rotate(-5 930 520)">$</text>

  <!-- ============ PRIMITIVE LABELS (annotations) ============ -->
  <!-- NegotiationContract label -->
  <g transform="translate(570 390)">
    <rect x="0" y="0" width="150" height="22" rx="4" fill="#fff" stroke="#d4d2c9" stroke-width="1" filter="url(#rough)"/>
    <text x="75" y="15" class="prim">NegotiationContract</text>
  </g>

  <!-- SettlementIntent label -->
  <g transform="translate(945 390)">
    <rect x="0" y="0" width="130" height="22" rx="4" fill="#fff" stroke="#d4d2c9" stroke-width="1" filter="url(#rough)"/>
    <text x="65" y="15" class="prim">SettlementIntent</text>
  </g>

  <!-- ExecutionReceipt label -->
  <g transform="translate(770 260)">
    <rect x="0" y="0" width="130" height="22" rx="4" fill="#fff" stroke="#d4d2c9" stroke-width="1" filter="url(#rough)"/>
    <text x="65" y="15" class="prim">ExecutionReceipt</text>
  </g>

  <!-- ============ HAND-DRAWN ANNOTATIONS ============ -->
  <text x="640" y="480" class="note" font-size="12" transform="rotate(8 640 480)">escrow holds funds</text>
  <text x="890" y="480" class="note" font-size="12" transform="rotate(-8 890 480)">conditional release</text>
  <text x="395" y="180" class="note" font-size="12" transform="rotate(-3 395 180)">identity + capabilities</text>
  <text x="820" y="180" class="note" font-size="12" transform="rotate(2 820 180)">signed proof of work</text>
  <text x="1100" y="180" class="note" font-size="12" transform="rotate(-1 1100 180)">immutable record</text>

  <!-- Handwritten state labels on negotiate box -->
  <text x="575" y="372" class="note" font-size="10">OFFER → COUNTER → ACCEPT</text>

  <!-- ============ KEY FEATURES (bottom left) ============ -->
  <g transform="translate(100 580)">
    <text x="0" y="0" class="hand" font-size="16" font-weight="700" fill="#121212">Five Primitives:</text>
    <text x="0" y="28" class="note" font-size="13">○  AgentIdentity — economic passport</text>
    <text x="0" y="50" class="note" font-size="13">○  NegotiationContract — terms exchange</text>
    <text x="0" y="72" class="note" font-size="13">○  SettlementIntent — escrow + splits</text>
    <text x="0" y="94" class="note" font-size="13">○  ExecutionReceipt — signed proof</text>
    <text x="0" y="116" class="note" font-size="13">○  VerityReceipt — dispute resolution</text>
  </g>

  <!-- ============ DESIGN PRINCIPLES (bottom right) ============ -->
  <g transform="translate(1200 600)">
    <text x="0" y="0" class="hand" font-size="14" font-weight="700" fill="#121212">Design:</text>
    <text x="0" y="24" class="note" font-size="12">deterministic · escrow-centric</text>
    <text x="0" y="44" class="note" font-size="12">append-only · agent-native</text>
    <text x="0" y="64" class="note" font-size="12">model-agnostic · MIT licensed</text>
  </g>

  <!-- ============ FOOTER ============ -->
  <text x="100" y="850" class="mono" font-size="12" fill="#6d6a63" letter-spacing="1">ACP v0.1  ·  AGENTRA LABS  ·  github.com/agentralabs/acp-protocol</text>

  <!-- Open standard badge -->
  <g filter="url(#rough)">
    <rect x="1400" y="70" width="120" height="30" rx="0" fill="#ea580c"/>
  </g>
  <text x="1460" y="91" class="mono" font-size="11" fill="#fffdf7" text-anchor="middle" font-weight="700" letter-spacing="2">OPEN STD</text>

</svg>