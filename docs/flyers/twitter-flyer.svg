<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Agentra Labs Twitter/X flyer">
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#d4d2c9"/>
    </pattern>
    <style><![CDATA[
      .m{font-family:'IBM Plex Mono','JetBrains Mono',monospace}
      .s{font-family:'Sora','Space Grotesk','Inter',sans-serif}
    ]]></style>
  </defs>

  <rect width="1600" height="900" fill="#f2f1ea"/>
  <rect width="1600" height="900" fill="url(#g)" opacity="0.5"/>

  <!-- Logo mark centered -->
  <g transform="translate(764 200) scale(3)" stroke="#121212" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/>
    <path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/>
    <path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/>
    <path d="M7 20v2"/><path d="M7 2v2"/>
    <rect x="4" y="4" width="16" height="16" rx="2"/>
    <rect x="8" y="8" width="8" height="8" rx="1" stroke="#ea580c"/>
  </g>

  <!-- Headline -->
  <text x="800" y="400" class="s" font-size="80" font-weight="700" fill="#121212" text-anchor="middle">Your AI agent forgets</text>
  <text x="800" y="494" class="s" font-size="80" font-weight="700" fill="#ea580c" text-anchor="middle">everything.</text>

  <!-- One-liner -->
  <text x="800" y="580" class="m" font-size="22" fill="#6d6a63" text-anchor="middle">We built seven open-source MCP servers so it doesn't have to.</text>

  <!-- CTA -->
  <text x="800" y="760" class="m" font-size="14" fill="#6d6a63" text-anchor="middle" letter-spacing="1">github.com/agentralabs</text>
</svg>
