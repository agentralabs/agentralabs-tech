<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="Agentic Planning LinkedIn flyer">
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#d4d2c9"/>
    </pattern>
    <style><![CDATA[
      .m{font-family:'IBM Plex Mono','JetBrains Mono',monospace}
      .s{font-family:'Sora','Space Grotesk','Inter',sans-serif}
    ]]></style>
  </defs>
  <rect width="1200" height="627" fill="#f2f1ea"/>
  <rect width="1200" height="627" fill="url(#g)" opacity="0.5"/>

  <!-- NOW LIVE badge -->
  <rect x="100" y="80" width="96" height="28" rx="0" fill="#ea580c"/>
  <text x="148" y="99" class="m" font-size="12" fill="#f2f1ea" text-anchor="middle" font-weight="700" letter-spacing="2">LIVE</text>

  <!-- Logo mark -->
  <g transform="translate(100 140) scale(2.8)" stroke="#121212" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/>
    <path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/>
    <path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/>
    <path d="M7 20v2"/><path d="M7 2v2"/>
    <rect x="4" y="4" width="16" height="16" rx="2"/>
    <rect x="8" y="8" width="8" height="8" rx="1" stroke="#ea580c"/>
  </g>

  <text x="100" y="240" class="m" font-size="13" fill="#ea580c" letter-spacing="4">AGENTIC PLANNING</text>

  <!-- Headline -->
  <text x="100" y="310" class="s" font-size="48" font-weight="700" fill="#121212">Goals with <tspan fill="#ea580c">physics.</tspan></text>
  <text x="100" y="370" class="s" font-size="48" font-weight="700" fill="#121212">Decisions with <tspan fill="#ea580c">memory.</tspan></text>

  <!-- Capabilities -->
  <text x="100" y="440" class="m" font-size="14" fill="#6d6a63">Living goals  ·  Shadow paths  ·  Progress physics  ·  Decision archaeology</text>
  <text x="100" y="468" class="m" font-size="14" fill="#6d6a63">Commitment tracking  ·  Multi-agent federation  ·  One portable .aplan file</text>

  <!-- CTA -->
  <text x="100" y="560" class="m" font-size="13" fill="#6d6a63" letter-spacing="1">pip install agentic-planning  ·  github.com/agentralabs</text>
</svg>