<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-label="ACP Protocol flow diagram">
  <defs>
    <style><![CDATA[
      .hand{font-family:'Segoe Print','Comic Sans MS','Caveat','Patrick Hand',cursive}
      .mono{font-family:'IBM Plex Mono','JetBrains Mono',monospace}
    ]]></style>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rough2" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="#fffdf7"/>
  <g opacity="0.08">
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#999"/>
    </pattern>
    <rect width="1600" height="500" fill="url(#dots)"/>
  </g>

  <!-- ============ 5 FLOW BOXES ============ -->

  <!-- Box 1: REGISTER -->
  <g filter="url(#rough)">
    <rect x="80" y="140" width="200" height="90" rx="10" fill="#fff8f0" stroke="#ea580c" stroke-width="2.8"/>
  </g>
  <text x="180" y="175" class="hand" font-size="13" fill="#ea580c" text-anchor="middle" letter-spacing="2" font-weight="700">STEP 1</text>
  <text x="180" y="210" class="hand" font-size="26" fill="#121212" text-anchor="middle" font-weight="700">Register</text>
  <!-- Schema name below -->
  <g filter="url(#rough)">
    <rect x="95" y="252" width="170" height="28" rx="6" fill="#fff" stroke="#d4d2c9" stroke-width="1.5"/>
  </g>
  <text x="180" y="272" class="mono" font-size="12" fill="#ea580c" text-anchor="middle">AgentIdentity</text>
  <!-- Annotation -->
  <text x="180" y="310" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">economic passport</text>
  <text x="180" y="328" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">Ed25519 keys · SLAs</text>

  <!-- Arrow 1→2 -->
  <g filter="url(#rough2)">
    <path d="M 285 185 C 310 185, 330 182, 355 185" fill="none" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="355,178 370,185 355,192" fill="#bbb"/>
  </g>
  <text x="328" y="170" class="hand" font-size="20" fill="#ea580c" font-weight="700">⚡</text>

  <!-- Box 2: NEGOTIATE -->
  <g filter="url(#rough)">
    <rect x="375" y="140" width="200" height="90" rx="10" fill="#fff8f0" stroke="#ea580c" stroke-width="2.8"/>
  </g>
  <text x="475" y="175" class="hand" font-size="13" fill="#ea580c" text-anchor="middle" letter-spacing="2" font-weight="700">STEP 2</text>
  <text x="475" y="210" class="hand" font-size="26" fill="#121212" text-anchor="middle" font-weight="700">Negotiate</text>
  <!-- Schema name below -->
  <g filter="url(#rough)">
    <rect x="365" y="252" width="220" height="28" rx="6" fill="#fff" stroke="#d4d2c9" stroke-width="1.5"/>
  </g>
  <text x="475" y="272" class="mono" font-size="12" fill="#ea580c" text-anchor="middle">NegotiationContract</text>
  <!-- Annotation -->
  <text x="475" y="310" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">OFFER → COUNTER</text>
  <text x="475" y="328" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">→ ACCEPT / REJECT</text>

  <!-- Arrow 2→3 -->
  <g filter="url(#rough2)">
    <path d="M 580 185 C 605 185, 630 182, 655 185" fill="none" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="655,178 670,185 655,192" fill="#bbb"/>
  </g>
  <text x="618" y="170" class="hand" font-size="18" fill="#ea580c" font-weight="700">$</text>

  <!-- Box 3: EXECUTE -->
  <g filter="url(#rough)">
    <rect x="675" y="140" width="200" height="90" rx="10" fill="#fff8f0" stroke="#ea580c" stroke-width="2.8"/>
  </g>
  <text x="775" y="175" class="hand" font-size="13" fill="#ea580c" text-anchor="middle" letter-spacing="2" font-weight="700">STEP 3</text>
  <text x="775" y="210" class="hand" font-size="26" fill="#121212" text-anchor="middle" font-weight="700">Execute</text>
  <!-- Schema name below -->
  <g filter="url(#rough)">
    <rect x="685" y="252" width="180" height="28" rx="6" fill="#fff" stroke="#d4d2c9" stroke-width="1.5"/>
  </g>
  <text x="775" y="272" class="mono" font-size="12" fill="#ea580c" text-anchor="middle">ExecutionReceipt</text>
  <!-- Annotation -->
  <text x="775" y="310" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">signed proof of work</text>
  <text x="775" y="328" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">immutable event chain</text>

  <!-- Arrow 3→4 -->
  <g filter="url(#rough2)">
    <path d="M 880 185 C 905 185, 930 182, 955 185" fill="none" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="955,178 970,185 955,192" fill="#bbb"/>
  </g>
  <text x="920" y="170" class="hand" font-size="20" fill="#ea580c" font-weight="700">⚡</text>

  <!-- Box 4: SETTLE -->
  <g filter="url(#rough)">
    <rect x="975" y="140" width="200" height="90" rx="10" fill="#fff8f0" stroke="#ea580c" stroke-width="2.8"/>
  </g>
  <text x="1075" y="175" class="hand" font-size="13" fill="#ea580c" text-anchor="middle" letter-spacing="2" font-weight="700">STEP 4</text>
  <text x="1075" y="210" class="hand" font-size="26" fill="#121212" text-anchor="middle" font-weight="700">Settle</text>
  <!-- Schema name below -->
  <g filter="url(#rough)">
    <rect x="985" y="252" width="180" height="28" rx="6" fill="#fff" stroke="#d4d2c9" stroke-width="1.5"/>
  </g>
  <text x="1075" y="272" class="mono" font-size="12" fill="#ea580c" text-anchor="middle">SettlementIntent</text>
  <!-- Annotation -->
  <text x="1075" y="310" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">escrow + conditional</text>
  <text x="1075" y="328" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">release · multi-splits</text>

  <!-- Arrow 4→5 -->
  <g filter="url(#rough2)">
    <path d="M 1180 185 C 1205 185, 1230 182, 1255 185" fill="none" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="1255,178 1270,185 1255,192" fill="#bbb"/>
  </g>
  <text x="1218" y="170" class="hand" font-size="18" fill="#ea580c" font-weight="700">$</text>

  <!-- Box 5: AUDIT -->
  <g filter="url(#rough)">
    <rect x="1275" y="140" width="200" height="90" rx="10" fill="#fff8f0" stroke="#ea580c" stroke-width="2.8"/>
  </g>
  <text x="1375" y="175" class="hand" font-size="13" fill="#ea580c" text-anchor="middle" letter-spacing="2" font-weight="700">STEP 5</text>
  <text x="1375" y="210" class="hand" font-size="26" fill="#121212" text-anchor="middle" font-weight="700">Audit</text>
  <!-- Schema name below -->
  <g filter="url(#rough)">
    <rect x="1300" y="252" width="150" height="28" rx="6" fill="#fff" stroke="#d4d2c9" stroke-width="1.5"/>
  </g>
  <text x="1375" y="272" class="mono" font-size="12" fill="#ea580c" text-anchor="middle">VerityReceipt</text>
  <!-- Annotation -->
  <text x="1375" y="310" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">dispute resolution</text>
  <text x="1375" y="328" class="hand" font-size="12" fill="#6d6a63" text-anchor="middle">reputation scoring</text>

  <!-- ============ TITLE ============ -->
  <text x="800" y="60" class="hand" font-size="32" font-weight="700" fill="#121212" text-anchor="middle">ACP Protocol Flow</text>
  <path d="M 620 68 C 700 72, 850 70, 980 72" fill="none" stroke="#ea580c" stroke-width="2.5" opacity="0.35" filter="url(#rough)"/>
  <text x="800" y="90" class="mono" font-size="13" fill="#6d6a63" text-anchor="middle">The five-step interaction sequence for agent-to-agent commerce</text>

  <!-- ============ BOTTOM LABEL ============ -->
  <text x="800" y="420" class="hand" font-size="15" fill="#121212" text-anchor="middle" font-weight="700">Each step produces a cryptographically signed, append-only record.</text>
  <text x="800" y="445" class="hand" font-size="13" fill="#6d6a63" text-anchor="middle">No money in limbo. Every outcome pre-declared. Every action auditable.</text>

  <!-- Footer -->
  <text x="800" y="485" class="mono" font-size="11" fill="#6d6a63" text-anchor="middle" letter-spacing="1">ACP v0.1  ·  github.com/agentralabs/acp-protocol</text>
</svg>