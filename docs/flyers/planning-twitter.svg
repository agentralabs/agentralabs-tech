<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Agentic Planning Twitter/X flyer">
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#d4d2c9"/>
    </pattern>
    <style><![CDATA[
      .m{font-family:'IBM Plex Mono','JetBrains Mono',monospace}
      .s{font-family:'Sora','Space Grotesk','Inter',sans-serif}
    ]]></style>
  </defs>
  <rect width="1600" height="900" fill="#f2f1ea"/>
  <rect width="1600" height="900" fill="url(#g)" opacity="0.5"/>

  <!-- NOW LIVE badge top right -->
  <rect x="1480" y="50" width="72" height="26" rx="0" fill="#ea580c"/>
  <text x="1516" y="68" class="m" font-size="11" fill="#f2f1ea" text-anchor="middle" font-weight="700" letter-spacing="2">LIVE</text>

  <!-- Logo mark centered -->
  <g transform="translate(764 160) scale(3)" stroke="#121212" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/>
    <path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/>
    <path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/>
    <path d="M7 20v2"/><path d="M7 2v2"/>
    <rect x="4" y="4" width="16" height="16" rx="2"/>
    <rect x="8" y="8" width="8" height="8" rx="1" stroke="#ea580c"/>
  </g>

  <!-- Headline -->
  <text x="800" y="370" class="s" font-size="72" font-weight="700" fill="#121212" text-anchor="middle">Your AI agent makes plans.</text>
  <text x="800" y="458" class="s" font-size="72" font-weight="700" fill="#ea580c" text-anchor="middle">Then forgets them.</text>

  <!-- Subline -->
  <text x="800" y="550" class="m" font-size="20" fill="#6d6a63" text-anchor="middle">Persistent planning infrastructure with goal physics, shadow paths, and decision memory.</text>

  <!-- CTA -->
  <text x="800" y="760" class="m" font-size="14" fill="#6d6a63" text-anchor="middle" letter-spacing="1">agentic-planning is now live  ·  github.com/agentralabs</text>
</svg>