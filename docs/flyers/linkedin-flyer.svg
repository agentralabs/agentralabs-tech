<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="Agentra Labs LinkedIn flyer">
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#d4d2c9"/>
    </pattern>
    <style><![CDATA[
      .m{font-family:'IBM Plex Mono','JetBrains Mono',monospace}
      .s{font-family:'Sora','Space Grotesk','Inter',sans-serif}
    ]]></style>
  </defs>

  <rect width="1200" height="627" fill="#f2f1ea"/>
  <rect width="1200" height="627" fill="url(#g)" opacity="0.5"/>

  <!-- Logo mark -->
  <g transform="translate(100 168) scale(3.2)" stroke="#121212" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/>
    <path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/>
    <path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/>
    <path d="M7 20v2"/><path d="M7 2v2"/>
    <rect x="4" y="4" width="16" height="16" rx="2"/>
    <rect x="8" y="8" width="8" height="8" rx="1" stroke="#ea580c"/>
  </g>

  <!-- Brand -->
  <text x="100" y="278" class="m" font-size="14" fill="#ea580c" letter-spacing="4">AGENTRA LABS</text>

  <!-- Headline -->
  <text x="100" y="352" class="s" font-size="54" font-weight="700" fill="#121212">Persistent infrastructure</text>
  <text x="100" y="416" class="s" font-size="54" font-weight="700" fill="#121212">for <tspan fill="#ea580c">AI agents.</tspan></text>

  <!-- One-liner -->
  <text x="100" y="480" class="m" font-size="16" fill="#6d6a63">Seven open-source MCP servers. Any model. Any client.</text>

  <!-- CTA -->
  <text x="100" y="560" class="m" font-size="13" fill="#6d6a63" letter-spacing="1">github.com/agentralabs</text>
</svg>
