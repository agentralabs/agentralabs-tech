<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="Agentra Labs workspace hero pane">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="320" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: WORKSPACE_ORCHESTRATOR</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">001</text>

  <!-- Five sister modules -->
  <rect x="46" y="88" width="232" height="236" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="46" y="88" width="232" height="38" fill="#111111"/>
  <text x="62" y="112" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">SISTER_REGISTRY</text>

  <!-- Memory node -->
  <rect x="64" y="148" width="96" height="28" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="74" y="167" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" letter-spacing="1">MEMORY</text>
  <rect x="168" y="148" width="8" height="28" fill="#ea580c"/>

  <!-- Vision node -->
  <rect x="64" y="184" width="96" height="28" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="74" y="203" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" letter-spacing="1">VISION</text>
  <rect x="168" y="184" width="8" height="28" fill="#ea580c"/>

  <!-- Codebase node -->
  <rect x="64" y="220" width="96" height="28" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="74" y="239" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" letter-spacing="1">CODEBASE</text>
  <rect x="168" y="220" width="8" height="28" fill="#111111"/>

  <!-- Identity node -->
  <rect x="64" y="256" width="96" height="28" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="74" y="275" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" letter-spacing="1">IDENTITY</text>
  <rect x="168" y="256" width="8" height="28" fill="#111111"/>

  <!-- Time node -->
  <rect x="64" y="292" width="96" height="28" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="74" y="311" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111" letter-spacing="1">TIME</text>
  <rect x="168" y="292" width="8" height="28" fill="#ea580c"/>

  <!-- Connection lines from registry to right side -->
  <line x1="176" y1="162" x2="204" y2="162" stroke="#ea580c" stroke-width="2"/>
  <line x1="176" y1="198" x2="204" y2="198" stroke="#ea580c" stroke-width="2"/>
  <line x1="176" y1="234" x2="204" y2="234" stroke="#111111" stroke-width="2"/>
  <line x1="176" y1="270" x2="204" y2="270" stroke="#111111" stroke-width="2"/>
  <line x1="176" y1="306" x2="204" y2="306" stroke="#ea580c" stroke-width="2"/>
  <!-- Vertical bus -->
  <line x1="204" y1="162" x2="204" y2="306" stroke="#111111" stroke-width="2"/>
  <!-- Bus to artifact zone -->
  <line x1="204" y1="234" x2="248" y2="234" stroke="#111111" stroke-width="2"/>

  <!-- Artifact badges -->
  <text x="196" y="144" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5f5c53" letter-spacing="1">.amem</text>
  <text x="196" y="336" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5f5c53" letter-spacing="1">.atime</text>

  <!-- Main title -->
  <text x="324" y="136" font-family="'JetBrains Mono', monospace" font-size="54" fill="#111111" font-weight="700" letter-spacing="1">AGENTRA</text>
  <text x="324" y="172" font-family="'JetBrains Mono', monospace" font-size="18" fill="#ea580c" font-weight="700" letter-spacing="2">FIVE SISTERS. ONE WORKSPACE. ANY AGENT.</text>
  <text x="324" y="210" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    Memory, vision, codebase, identity, and time — each a standalone MCP server
  </text>
  <text x="324" y="234" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    with a portable binary artifact. Install one or all. Any model. Any client.
  </text>

  <rect x="324" y="258" width="154" height="34" fill="#111111"/>
  <text x="340" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">ORCHESTRATOR</text>
  <rect x="488" y="258" width="146" height="34" fill="#111111"/>
  <text x="516" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">5 SISTERS</text>
  <rect x="644" y="258" width="156" height="34" fill="#ea580c"/>
  <text x="660" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">5 ARTIFACTS</text>
</svg>
