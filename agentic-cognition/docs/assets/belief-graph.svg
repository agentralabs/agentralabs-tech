<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <text x="300" y="25" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#1f2937">Belief Graph with Physics</text>
  <circle cx="300" cy="200" r="45" fill="#fef3c7" stroke="#d97706" stroke-width="3"/><text x="300" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold">KEYSTONE</text><text x="300" y="210" text-anchor="middle" font-family="system-ui" font-size="9">"I am worthy"</text>
  <circle cx="150" cy="120" r="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="150" y="125" text-anchor="middle" font-family="system-ui" font-size="9">"I can learn"</text>
  <circle cx="450" cy="120" r="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="450" y="125" text-anchor="middle" font-family="system-ui" font-size="9">"Effort pays"</text>
  <circle cx="150" cy="300" r="30" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/><text x="150" y="305" text-anchor="middle" font-family="system-ui" font-size="9">"I'm creative"</text>
  <circle cx="450" cy="300" r="30" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="450" y="300" text-anchor="middle" font-family="system-ui" font-size="9">"I'm lazy"</text><text x="450" y="312" text-anchor="middle" font-family="system-ui" font-size="7">(contradicts)</text>
  <rect cx="300" x="265" y="340" width="70" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/><text x="300" y="360" text-anchor="middle" font-family="system-ui" font-size="8">Crystallized</text>
  <circle cx="500" cy="200" r="25" fill="#fce7f3" stroke="#db2777" stroke-width="2" stroke-dasharray="4,2"/><text x="500" y="195" text-anchor="middle" font-family="system-ui" font-size="8">SHADOW</text><text x="500" y="208" text-anchor="middle" font-family="system-ui" font-size="7">"Fear failure"</text>
  <line x1="180" y1="140" x2="260" y2="175" stroke="#3b82f6" stroke-width="2"/>
  <line x1="340" y1="175" x2="420" y2="140" stroke="#3b82f6" stroke-width="2"/>
  <line x1="260" y1="225" x2="180" y2="275" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="340" y1="225" x2="420" y2="275" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="300" y="430" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">Blue=Supports | Red dashed=Contradicts | Pink dashed=Shadow | Green=Crystallized</text>
</svg>
