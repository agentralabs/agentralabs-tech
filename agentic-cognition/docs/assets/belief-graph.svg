<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #1a1a2e; }
      .node { stroke-width: 2; }
      .label { font: 12px sans-serif; fill: #333; }
      .edge { stroke-width: 1.5; fill: none; }
      .legend { font: 11px sans-serif; fill: #555; }
    </style>
  </defs>

  <text x="300" y="25" text-anchor="middle" class="title">Belief Graph Structure</text>

  <!-- Keystone belief -->
  <circle cx="300" cy="150" r="30" class="node" fill="#7c3aed" stroke="#5b21b6"/>
  <text x="300" y="155" text-anchor="middle" class="label" fill="white">Keystone</text>

  <!-- Connected beliefs -->
  <circle cx="150" cy="100" r="22" class="node" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="150" y="105" text-anchor="middle" class="label" fill="white">B1</text>

  <circle cx="450" cy="100" r="22" class="node" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="450" y="105" text-anchor="middle" class="label" fill="white">B2</text>

  <circle cx="180" cy="230" r="22" class="node" fill="#059669" stroke="#047857"/>
  <text x="180" y="235" text-anchor="middle" class="label" fill="white">B3</text>

  <circle cx="420" cy="230" r="22" class="node" fill="#059669" stroke="#047857"/>
  <text x="420" y="235" text-anchor="middle" class="label" fill="white">B4</text>

  <circle cx="300" cy="280" r="22" class="node" fill="#dc2626" stroke="#b91c1c"/>
  <text x="300" y="285" text-anchor="middle" class="label" fill="white">B5</text>

  <!-- Shadow belief -->
  <circle cx="80" cy="200" r="18" class="node" fill="#9ca3af" stroke="#6b7280" stroke-dasharray="4,4"/>
  <text x="80" y="205" text-anchor="middle" class="label">Shadow</text>

  <!-- Edges -->
  <line x1="172" y1="100" x2="270" y2="140" class="edge" stroke="#4361ee"/>
  <line x1="428" y1="100" x2="330" y2="140" class="edge" stroke="#4361ee"/>
  <line x1="200" y1="220" x2="278" y2="165" class="edge" stroke="#4361ee"/>
  <line x1="400" y1="220" x2="322" y2="165" class="edge" stroke="#4361ee"/>
  <line x1="300" y1="258" x2="300" y2="180" class="edge" stroke="#dc2626" stroke-dasharray="4,4"/>
  <line x1="97" y1="195" x2="158" y2="225" class="edge" stroke="#9ca3af" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="30" y="320" width="540" height="60" rx="5" fill="#f9fafb" stroke="#e5e7eb"/>
  <circle cx="60" cy="345" r="8" fill="#7c3aed"/>
  <text x="75" y="349" class="legend">Keystone</text>
  <circle cx="160" cy="345" r="8" fill="#2563eb"/>
  <text x="175" y="349" class="legend">Active</text>
  <circle cx="240" cy="345" r="8" fill="#059669"/>
  <text x="255" y="349" class="legend">Crystallized</text>
  <circle cx="350" cy="345" r="8" fill="#dc2626"/>
  <text x="365" y="349" class="legend">Contradiction</text>
  <circle cx="470" cy="345" r="8" fill="#9ca3af" stroke="#6b7280" stroke-dasharray="2,2"/>
  <text x="485" y="349" class="legend">Shadow</text>
</svg>
