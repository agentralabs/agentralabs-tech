<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #1a1a2e; }
      .label { font: 14px sans-serif; fill: #16213e; }
      .sublabel { font: 12px sans-serif; fill: #555; }
      .box { rx: 8; ry: 8; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" class="title">AgenticCognition — Architecture</text>

  <!-- MCP Server -->
  <rect x="280" y="50" width="240" height="60" class="box" fill="#e8f4f8" stroke="#0077b6"/>
  <text x="400" y="75" text-anchor="middle" class="label">MCP Server (acog-mcp)</text>
  <text x="400" y="95" text-anchor="middle" class="sublabel">14 tools, stdio transport</text>

  <!-- Ghost Bridge -->
  <rect x="560" y="55" width="180" height="50" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="650" y="80" text-anchor="middle" class="label">Ghost Bridge</text>
  <text x="650" y="95" text-anchor="middle" class="sublabel">.claude / .cursor</text>
  <line x1="520" y1="80" x2="558" y2="80" class="arrow"/>

  <!-- Protocol Handler -->
  <rect x="280" y="140" width="240" height="50" class="box" fill="#f0f0ff" stroke="#4361ee"/>
  <text x="400" y="170" text-anchor="middle" class="label">ProtocolHandler</text>
  <line x1="400" y1="110" x2="400" y2="138" class="arrow"/>

  <!-- Query + Write Engines -->
  <rect x="160" y="220" width="200" height="50" class="box" fill="#e8ffe8" stroke="#2d6a4f"/>
  <text x="260" y="250" text-anchor="middle" class="label">QueryEngine</text>
  <rect x="440" y="220" width="200" height="50" class="box" fill="#ffe8e8" stroke="#d00000"/>
  <text x="540" y="250" text-anchor="middle" class="label">WriteEngine</text>
  <line x1="350" y1="190" x2="290" y2="218" class="arrow"/>
  <line x1="450" y1="190" x2="510" y2="218" class="arrow"/>

  <!-- CognitionStore -->
  <rect x="280" y="300" width="240" height="50" class="box" fill="#f5f5f5" stroke="#333"/>
  <text x="400" y="330" text-anchor="middle" class="label">CognitionStore</text>
  <line x1="260" y1="270" x2="340" y2="298" class="arrow"/>
  <line x1="540" y1="270" x2="460" y2="298" class="arrow"/>

  <!-- Inventions -->
  <rect x="60" y="300" width="180" height="50" class="box" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="150" y="330" text-anchor="middle" class="label">Inventions Layer</text>
  <text x="150" y="345" text-anchor="middle" class="sublabel">shadow, drift, soul, sim</text>
  <line x1="200" y1="270" x2="170" y2="298" class="arrow"/>

  <!-- .acog Files -->
  <rect x="300" y="380" width="200" height="50" class="box" fill="#fff8e1" stroke="#f57f17"/>
  <text x="400" y="405" text-anchor="middle" class="label">.acog Files</text>
  <text x="400" y="425" text-anchor="middle" class="sublabel">msgpack persistence</text>
  <line x1="400" y1="350" x2="400" y2="378" class="arrow"/>

  <!-- IndexManager -->
  <rect x="560" y="300" width="180" height="50" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="650" y="330" text-anchor="middle" class="label">IndexManager</text>
  <text x="650" y="345" text-anchor="middle" class="sublabel">domain, state, keystone</text>
  <line x1="520" y1="325" x2="558" y2="325" class="arrow"/>
</svg>
