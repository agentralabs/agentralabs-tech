<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #1a1a2e; }
      .label { font: 12px sans-serif; fill: #333; }
      .axis { font: 11px sans-serif; fill: #888; }
      .ring { stroke-width: 2; }
    </style>
  </defs>

  <text x="350" y="25" text-anchor="middle" class="title">Identity Drift Timeline</text>

  <!-- Time axis -->
  <line x1="60" y1="220" x2="660" y2="220" stroke="#ccc" stroke-width="1.5"/>
  <text x="60" y="245" text-anchor="middle" class="axis">t₀</text>
  <text x="210" y="245" text-anchor="middle" class="axis">t₁</text>
  <text x="360" y="245" text-anchor="middle" class="axis">t₂</text>
  <text x="510" y="245" text-anchor="middle" class="axis">t₃</text>
  <text x="660" y="245" text-anchor="middle" class="axis">t₄</text>

  <!-- Growth rings -->
  <circle cx="60" cy="160" r="15" class="ring" fill="#e8f4f8" stroke="#0077b6"/>
  <circle cx="210" cy="140" r="25" class="ring" fill="#e8f4f8" stroke="#0077b6"/>
  <circle cx="360" cy="110" r="35" class="ring" fill="#e8f4f8" stroke="#0077b6"/>
  <circle cx="510" cy="90" r="40" class="ring" fill="#e8f4f8" stroke="#0077b6"/>
  <circle cx="660" cy="80" r="45" class="ring" fill="#e8f4f8" stroke="#0077b6"/>

  <!-- Drift line -->
  <polyline points="60,160 210,140 360,110 510,90 660,80" fill="none" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Metamorphosis marker -->
  <polygon points="360,60 370,75 350,75" fill="#dc2626"/>
  <text x="360" y="55" text-anchor="middle" class="label" fill="#dc2626">Metamorphosis</text>

  <!-- Value shift markers -->
  <rect x="195" y="155" width="30" height="6" rx="3" fill="#f59e0b"/>
  <text x="260" y="162" class="label" fill="#f59e0b">Value shift</text>

  <!-- Legend -->
  <rect x="50" y="260" width="600" height="30" rx="5" fill="#f9fafb" stroke="#e5e7eb"/>
  <circle cx="80" cy="275" r="6" fill="#e8f4f8" stroke="#0077b6" stroke-width="1.5"/>
  <text x="92" y="279" class="axis">Growth ring</text>
  <line x1="190" y1="275" x2="220" y2="275" stroke="#7c3aed" stroke-width="2"/>
  <text x="225" y="279" class="axis">Identity drift</text>
  <polygon points="340,269 346,280 334,280" fill="#dc2626"/>
  <text x="352" y="279" class="axis">Metamorphosis</text>
  <rect x="460" y="272" width="20" height="5" rx="2" fill="#f59e0b"/>
  <text x="485" y="279" class="axis">Value tectonic shift</text>
</svg>
