<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs><marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker></defs>
