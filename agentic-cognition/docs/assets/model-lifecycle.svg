  <ellipse cx="200" cy="150" rx="50" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="200" y="155" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold">Infancy</text>
