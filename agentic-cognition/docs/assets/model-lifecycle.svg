<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #1a1a2e; }
      .stage { font: bold 14px sans-serif; fill: white; }
      .desc { font: 11px sans-serif; fill: #555; }
      .box { rx: 20; ry: 20; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" class="title">User Model Lifecycle Stages</text>

  <!-- Birth -->
  <rect x="30" y="60" width="120" height="50" class="box" fill="#7c3aed"/>
  <text x="90" y="90" text-anchor="middle" class="stage">Birth</text>
  <text x="90" y="130" text-anchor="middle" class="desc">Model created</text>
  <text x="90" y="145" text-anchor="middle" class="desc">First evidence</text>

  <!-- Growing -->
  <rect x="190" y="60" width="120" height="50" class="box" fill="#2563eb"/>
  <text x="250" y="90" text-anchor="middle" class="stage">Growing</text>
  <text x="250" y="130" text-anchor="middle" class="desc">Beliefs forming</text>
  <text x="250" y="145" text-anchor="middle" class="desc">Patterns emerging</text>
  <line x1="150" y1="85" x2="188" y2="85" class="arrow"/>

  <!-- Adolescent -->
  <rect x="350" y="60" width="120" height="50" class="box" fill="#0891b2"/>
  <text x="410" y="90" text-anchor="middle" class="stage">Adolescent</text>
  <text x="410" y="130" text-anchor="middle" class="desc">Shadow emerges</text>
  <text x="410" y="145" text-anchor="middle" class="desc">Contradictions</text>
  <line x1="310" y1="85" x2="348" y2="85" class="arrow"/>

  <!-- Mature -->
  <rect x="510" y="60" width="120" height="50" class="box" fill="#059669"/>
  <text x="570" y="90" text-anchor="middle" class="stage">Mature</text>
  <text x="570" y="130" text-anchor="middle" class="desc">High confidence</text>
  <text x="570" y="145" text-anchor="middle" class="desc">Stable predictions</text>
  <line x1="470" y1="85" x2="508" y2="85" class="arrow"/>

  <!-- Transcendent -->
  <rect x="670" y="60" width="120" height="50" class="box" fill="#dc2626"/>
  <text x="730" y="90" text-anchor="middle" class="stage">Transcendent</text>
  <text x="730" y="130" text-anchor="middle" class="desc">Soul reflection</text>
  <text x="730" y="145" text-anchor="middle" class="desc">Deep patterns</text>
  <line x1="630" y1="85" x2="668" y2="85" class="arrow"/>

  <!-- Crisis path -->
  <rect x="350" y="200" width="120" height="50" class="box" fill="#f59e0b"/>
  <text x="410" y="230" text-anchor="middle" class="stage">Crisis</text>
  <text x="410" y="270" text-anchor="middle" class="desc">Belief collapse</text>
  <text x="410" y="285" text-anchor="middle" class="desc">Metamorphosis</text>

  <!-- Crisis arrows -->
  <path d="M 410 110 L 410 198" class="arrow"/>
  <path d="M 470 225 C 530 225 530 110 570 110" class="arrow" style="stroke-dasharray: 5,5"/>
</svg>
