# cbindgen configuration for generating C headers from the FFI crate.
#
# Generate headers with:
#   cbindgen --config crates/agentic-cognition-ffi/cbindgen.toml \
#            --crate agentic-cognition-ffi \
#            --output include/agentic_cognition.h

language = "C"
include_guard = "AGENTIC_COGNITION_H"
pragma_once = true
tab_width = 4

[parse]
parse_deps = false

[export]
prefix = "AgenticCognition"

[fn]
rename_args = "CamelCase"

[struct]
rename_fields = "CamelCase"

[enum]
rename_variants = "QualifiedScreamingSnakeCase"
