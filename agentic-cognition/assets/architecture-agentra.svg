  <rect x="90" y="230" width="800" height="120" fill="#1e293b" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="490" y="255" font-family="system-ui, sans-serif" font-size="14" fill="#c9d1d9" text-anchor="middle">COGNITION ENGINE</text>
  <!-- Sub-modules -->
  <rect x="110" y="270" width="140" height="60" fill="#0d1117" stroke="#3B82F6" stroke-width="1" rx="4"/>
  <text x="180" y="295" font-family="monospace" font-size="11" fill="#3B82F6" text-anchor="middle">Write Engine</text>
  <text x="180" y="315" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">CRUD + heartbeat</text>
  <rect x="270" y="270" width="140" height="60" fill="#0d1117" stroke="#3B82F6" stroke-width="1" rx="4"/>
  <text x="340" y="295" font-family="monospace" font-size="11" fill="#3B82F6" text-anchor="middle">Query Engine</text>
  <text x="340" y="315" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">search + graph</text>
  <rect x="430" y="270" width="140" height="60" fill="#0d1117" stroke="#8B5CF6" stroke-width="1" rx="4"/>
  <text x="500" y="295" font-family="monospace" font-size="11" fill="#8B5CF6" text-anchor="middle">24 Inventions</text>
  <text x="500" y="315" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">P0-P4 tiers</text>
  <rect x="590" y="270" width="140" height="60" fill="#0d1117" stroke="#22C55E" stroke-width="1" rx="4"/>
  <text x="660" y="295" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle">Belief Physics</text>
  <text x="660" y="315" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">crystal + gravity</text>
  <rect x="750" y="270" width="120" height="60" fill="#0d1117" stroke="#22C55E" stroke-width="1" rx="4"/>
  <text x="810" y="295" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle">Prediction</text>
  <text x="810" y="315" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">oracle + sim</text>
  <!-- Arrow to storage -->
  <line x1="490" y1="350" x2="490" y2="380" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="485,380 490,390 495,380" fill="#F59E0B"/>
  <!-- Storage -->
  <rect x="340" y="390" width="300" height="50" fill="#1e293b" stroke="#22C55E" stroke-width="1" rx="8"/>
  <text x="490" y="412" font-family="system-ui, sans-serif" font-size="14" fill="#22C55E" text-anchor="middle">.acog FILE</text>
  <text x="490" y="430" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">BLAKE3 integrity | atomic writes | your user model</text>
