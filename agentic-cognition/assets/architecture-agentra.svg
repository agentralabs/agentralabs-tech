<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <rect width="980" height="520" fill="#0d1117" rx="12"/>
  <text x="490" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#c9d1d9" text-anchor="middle">AgenticCognition Architecture</text>
  <!-- Agent Layer -->
  <rect x="240" y="60" width="500" height="50" fill="#1e293b" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="490" y="82" font-family="system-ui, sans-serif" font-size="14" fill="#c9d1d9" text-anchor="middle">YOUR AI AGENT</text>
  <text x="490" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Claude | Cursor | Windsurf | Cody</text>
  <!-- Arrow -->
  <line x1="490" y1="110" x2="490" y2="140" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="485,140 490,150 495,140" fill="#F59E0B"/>
  <!-- MCP Layer -->
  <rect x="340" y="150" width="300" height="40" fill="#1e293b" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="490" y="175" font-family="system-ui, sans-serif" font-size="14" fill="#F59E0B" text-anchor="middle">MCP LAYER -- 14 Tools + stdio</text>
  <!-- Arrow -->
  <line x1="490" y1="190" x2="490" y2="220" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="485,220 490,230 495,220" fill="#F59E0B"/>
